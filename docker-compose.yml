services:
  web:
    image: webdevops/php-apache:8.2
    container_name: apache_server
    ports:
      - "8080:80"
    volumes:
      - ./website:/var/www/html
    environment:
    - WEB_DOCUMENT_ROOT=/var/www/html
    depends_on:
      - db

  db:
    image: mysql
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: root1
    volumes:
      - myvol:/var/lib/mysql

volumes:
  myvol: